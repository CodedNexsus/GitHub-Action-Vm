name: Runner Location

on:
  workflow_dispatch:
  push:

jobs:
  get-runner-info:
    runs-on: ubuntu-latest
    steps:
      - name: Runner Location
        run: |
          echo "Runner: $RUNNER_NAME"
          echo "OS: $RUNNER_OS"
          echo "Arch: $RUNNER_ARCH"
          curl -s https://ipinfo.io
          uname -a
          hostname
          cat /etc/os-release

      - name: Latency to India
        run: |
          echo "=== Ping to Indian Servers ==="
          ping -c 5 103.21.58.1 || true
          ping -c 5 speedtest.blr1.digitalocean.com || true
          ping -c 5 157.240.1.35 || true
          
          echo ""
          echo "=== HTTP Latency to Indian Endpoints ==="
          for url in "https://www.google.co.in" "https://github.com" "https://speedtest.blr1.digitalocean.com"; do
            echo -n "$url: "
            curl -s -o /dev/null -w "DNS: %{time_namelookup}s | Connect: %{time_connect}s | TLS: %{time_appconnect}s | Total: %{time_total}s\n" "$url" || echo "FAILED"
          done

      - name: Speed Test
        run: |
          echo "=== Install Speedtest ==="
          curl -s https://packagecloud.io/install/repositories/ookla/speedtest-cli/script.deb.sh | sudo bash || true
          sudo apt-get install -y speedtest || pip install speedtest-cli || true
          
          echo ""
          echo "=== Speed Test ==="
          speedtest --simple 2>/dev/null || speedtest-cli --simple 2>/dev/null || echo "Speedtest not available"
          
          echo ""
          echo "=== Download Speed Test (100MB) ==="
          curl -s -o /dev/null -w "Download: %{speed_download} bytes/s | Time: %{time_total}s\n" http://speedtest.tele2.net/100MB.zip || echo "Download test failed"
          
          echo ""
          echo "=== Upload Test ==="
          dd if=/dev/urandom of=/tmp/testfile bs=1M count=10 2>/dev/null
          curl -s -o /dev/null -w "Upload: %{speed_upload} bytes/s | Time: %{time_total}s\n" -X POST -F "file=@/tmp/testfile" http://speedtest.tele2.net/upload || echo "Upload test failed"
          rm -f /tmp/testfile
