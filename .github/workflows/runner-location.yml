name: Runner Location

on:
  workflow_dispatch:
  push:

jobs:
  get-runner-info:
    runs-on: ubuntu-latest
    steps:
      - name: Runner Location
        run: |
          echo "Runner: $RUNNER_NAME"
          echo "OS: $RUNNER_OS"
          echo "Arch: $RUNNER_ARCH"
          curl -s https://ipinfo.io
          uname -a
          hostname
          cat /etc/os-release
